apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pedidoscloud
  labels:
    app: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: orders-service
  namespace: pedidoscloud
spec:
  type: ClusterIP
  selector:
    app: orders-service
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: payments-service
  namespace: pedidoscloud
spec:
  type: ClusterIP
  selector:
    app: payments-service
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: pedidoscloud
spec:
  type: ClusterIP
  selector:
    app: inventory-service
  ports:
    - port: 8003
      targetPort: 8003
